        <form>
            <fieldset>
                <table> 
                    <tr><b>글 작성하기</b></tr>

                        <td><label for="write">작성자</label></td>
                        <td><input id="write" type="name"></td>
                    </tr>

                    </tr>
                    <tr>

                    </tr>
                    <tr>
                        <td><input type="submit"></td>
                    </tr>
